<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FOODBOT</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <!-- Tu CSS -->
  <link href="style.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md fb-navbar fixed-top">
  <div class="container">
    <a class="fb-logo" href="#">🍔 FOODBOT</a>

    <div class="ms-auto d-flex gap-2">
      <button class="fb-btn-outline">Login</button>
      <button class="fb-btn-primary">Registro</button>
      <button class="fb-cart-btn">
        🛒
        <span class="fb-cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="fb-hero text-center text-md-start">
  <div class="container py-5 mt-5">
    <div class="row align-items-center">

      <div class="col-md-6">
        <span class="hero-badge">🚀 Delivery Inteligente</span>

        <h1 class="hero-title mt-3">
          Pide comida con <span class="text-accent">IA</span>
        </h1>

        <p class="hero-subtitle">
          FOODBOT te recomienda restaurantes y platos automáticamente según tus gustos.
        </p>

        <div class="hero-actions">
          <button class="fb-btn-hero-primary" onclick="mostrarRestaurantes()">
            Ver restaurantes
          </button>
        </div>
      </div>

      <div class="col-md-6 text-center mt-4">
        <div class="center-bot">🤖</div>
      </div>

    </div>
  </div>
</section>

<!-- RESTAURANTES -->
<section id="restaurantes" class="container py-5">
  <h2 class="fb-view-title mb-4">Restaurantes</h2>

  <div class="row g-4" id="restaurant-list"></div>
</section>

<!-- PRODUCTOS -->
<section id="productos" class="container py-5">
  <h2 class="fb-view-title mb-4">Menú</h2>

  <div class="row g-4" id="product-list"></div>
</section>

<!-- CARRITO -->
<section class="container py-5">
  <h2 class="fb-view-title mb-4">Carrito</h2>

  <div id="cart-items"></div>

  <h4 class="mt-3">Total: $<span id="total">0</span></h4>
</section>

<!-- CHATBOT -->
<button class="fb-chat-toggle" onclick="toggleChat()">
  💬 Chat
</button>

<div class="fb-chatbot-widget" id="chatbot">
  <div class="chatbot-header">
    <span>🤖 FOODBOT</span>
    <button onclick="toggleChat()">✖</button>
  </div>

  <div class="chatbot-messages" id="chat-messages"></div>

  <div class="chatbot-input-area">
    <input id="chat-input" class="chatbot-input" placeholder="Escribe..." />
    <button class="chatbot-send" onclick="sendMessage()">➤</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
